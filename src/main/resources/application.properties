# Application
spring.application.name=url-shortener
# Server
server.port=8080
# Database Configuration (PostgresSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/url_shortener
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
# Connection Pool (Hikari - default in Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
# Fail fast if no connection is available within 20 s instead of waiting 30 s
spring.datasource.hikari.connection-timeout=20000
# Recycle connections before they hit the server's idle timeout (default 30 min)
spring.datasource.hikari.max-lifetime=1800000
# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
# Logging ? keep security info; remove SQL DEBUG/TRACE noise in production
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.level=%5p [%X{X-Correlation-Id}]
jwt.secret=Z3VhcmFudGVlZF9zZWN1cmVfMzJfYnl0ZV9rZXlfZm9yX2hTMjU2X3Rlc3Q=
jwt.expirationMs=3600000
app.base-url=http://localhost:8080
# Caffeine cache: shortUrls used by RedirectService to skip DB on hot redirects
app.cache.short-urls.max-size=10000
app.cache.short-urls.expire-after-write-minutes=5
# SpringDoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
